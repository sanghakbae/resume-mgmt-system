name: Deploy Resume

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: "/"
          VITE_ENABLE_FIREBASE: "true"
          VITE_PUBLIC_RESUME_MODE: "true"
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID != '' && vars.VITE_GOOGLE_CLIENT_ID || secrets.VITE_GOOGLE_CLIENT_ID }}
          # Firebase web config is public by design (access is controlled by Firestore rules).
          VITE_FIREBASE_API_KEY: "AIzaSyCex1fwFO-Krpl_fmfxCCvtGJ1yTKCuY-A"
          VITE_FIREBASE_AUTH_DOMAIN: "resume-mgmt-system.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "resume-mgmt-system"
          VITE_FIREBASE_APP_ID: "1:781624201970:web:f78f6971a07173ede7766b"
          VITE_FIREBASE_STORAGE_BUCKET: "resume-mgmt-system.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "781624201970"
          VITE_EDITOR_EMAILS: "totoriverce@gmail.com"
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
